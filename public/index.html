<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kian class home work</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div id="authSection">
            <h1>i'm not robot enter the captcha </h1>
            
            <div class="captcha-container">
                <img src="captcha.png" alt="Captcha Image" class="captcha-image">
            </div>

            <div class="input-group">
                <input type="text" id="messageInput" placeholder="enter captcha">
                <button id="sendBtn">Submit</button>
            </div>
        </div>
        
        <div class="response-container">
            <strong>Server Response:</strong>
            <p id="responseOutput">Waiting for captcha...</p>
        </div>

        <div id="videoContainer" style="display: none; margin-top: 20px;">
            <iframe id="myVideo" width="100%" height="250" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
